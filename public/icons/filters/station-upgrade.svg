<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Gear outer ring -->
  <circle cx="24" cy="24" r="20" fill="#5A6070"/>
  <!-- Gear teeth (simplified as rects) -->
  <rect x="21" y="2" width="6" height="6" fill="#5A6070"/>
  <rect x="21" y="40" width="6" height="6" fill="#5A6070"/>
  <rect x="2" y="21" width="6" height="6" fill="#5A6070"/>
  <rect x="40" y="21" width="6" height="6" fill="#5A6070"/>
  <rect x="8" y="8" width="6" height="6" fill="#5A6070" transform="rotate(45 11 11)"/>
  <rect x="34" y="8" width="6" height="6" fill="#5A6070" transform="rotate(45 37 11)"/>
  <rect x="8" y="34" width="6" height="6" fill="#5A6070" transform="rotate(45 11 37)"/>
  <rect x="34" y="34" width="6" height="6" fill="#5A6070" transform="rotate(45 37 37)"/>
  <!-- Gear inner circle (cutout) -->
  <circle cx="24" cy="24" r="12" fill="#3A4050"/>
  <!-- Upward arrow/chevron -->
  <polygon points="24,10 32,22 26,22 26,34 22,34 22,22 16,22" fill="#6AA84F"/>
</svg>
