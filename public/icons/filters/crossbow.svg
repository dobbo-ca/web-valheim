<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Stock (horizontal) -->
  <rect x="6" y="22" width="36" height="5" rx="2" fill="#8B6D4A"/>
  <!-- Tiller/grip drop -->
  <rect x="22" y="27" width="6" height="10" rx="2" fill="#8B6D4A"/>
  <!-- Bow limbs (vertical crosspiece) -->
