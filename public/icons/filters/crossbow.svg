  <!-- Bowstring -->
  <line x1="12" y1="14" x2="12" y2="34" stroke="#D0D0D0" stroke-width="1.5"/>
  <!-- Rail/track -->
  <rect x="12" y="23" width="26" height="2" rx="1" fill="#5A6070"/>
</svg>
