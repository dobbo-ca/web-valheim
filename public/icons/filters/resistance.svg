<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Bottle body -->
  <rect x="14" y="22" width="20" height="22" rx="3" fill="#E8E8E8"/>
  <!-- Liquid fill (green for resistance) -->
  <rect x="15" y="30" width="18" height="13" rx="2" fill="#4A8A4A"/>
  <!-- Glass shadow -->
  <rect x="30" y="22" width="4" height="22" rx="2" fill="#C0C0C0"/>
  <!-- Neck -->
  <rect x="19" y="14" width="10" height="10" fill="#E8E8E8"/>
  <rect x="27" y="14" width="2" height="10" fill="#C0C0C0"/>
  <!-- Cork -->
  <rect x="20" y="10" width="8" height="6" rx="1" fill="#A0804A"/>
  <!-- Shield symbol -->
  <polygon points="24,31 29,34 28,40 24,42 20,40 19,34" fill="#FFFFFF"/>
  <polygon points="24,33 27,35 26,39 24,40 22,39 21,35" fill="#4A8A4A"/>
</svg>
