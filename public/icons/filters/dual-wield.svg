<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Left sword blade -->
  <polygon points="14,2 17,26 14,24 11,26" fill="#B0B8C8"/>
  <polygon points="14,2 17,26 16,14" fill="#D0D8E0"/>
  <!-- Left crossguard -->
  <rect x="6" y="26" width="16" height="3" fill="#C4A84A"/>
  <!-- Left handle -->
  <rect x="12" y="30" width="4" height="10" fill="#8B6D4A"/>
  <!-- Left pommel -->
  <rect x="11" y="40" width="6" height="4" rx="1" fill="#C4A84A"/>
  <!-- Right sword blade -->
  <polygon points="34,2 37,26 34,24 31,26" fill="#B0B8C8"/>
  <polygon points="34,2 37,26 36,14" fill="#D0D8E0"/>
  <!-- Right crossguard -->
  <rect x="26" y="26" width="16" height="3" fill="#C4A84A"/>
  <!-- Right handle -->
  <rect x="32" y="30" width="4" height="10" fill="#8B6D4A"/>
  <!-- Right pommel -->
  <rect x="31" y="40" width="6" height="4" rx="1" fill="#C4A84A"/>
</svg>
