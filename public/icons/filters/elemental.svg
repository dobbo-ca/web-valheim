<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Split divider (diagonal) -->
  <!-- Fire side (left/top) -->
  <polygon points="0,0 48,0 0,48" fill="#CC6622"/>
  <!-- Ice side (right/bottom) -->
  <polygon points="48,0 48,48 0,48" fill="#6088CC"/>
  <!-- Fire flames -->
  <polygon points="8,36 12,20 16,30 18,14 22,28 18,36" fill="#FF8844"/>
  <!-- Ice crystal -->
  <polygon points="36,12 40,22 36,32 32,22" fill="#80A8EC"/>
  <polygon points="28,18 38,22 28,26 38,22" fill="#80A8EC"/>
  <!-- Divider line -->
  <line x1="0" y1="48" x2="48" y2="0" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>
</svg>
