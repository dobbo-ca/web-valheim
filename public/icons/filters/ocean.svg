<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Sky -->
  <rect x="0" y="0" width="48" height="22" fill="#6A9FCC"/>
  <!-- Sun low on horizon -->
  <circle cx="36" cy="18" r="5" fill="#F4D03F"/>
  <!-- Ocean water -->
  <rect x="0" y="22" width="48" height="26" fill="#2A6A9A"/>
  <!-- Waves -->
  <ellipse cx="14" cy="26" rx="12" ry="3" fill="#3A7AAA"/>
  <ellipse cx="38" cy="30" rx="10" ry="3" fill="#3A7AAA"/>
  <ellipse cx="24" cy="34" rx="14" ry="3" fill="#2A5A8A"/>
  <!-- Wave crests -->
  <rect x="6" y="24" width="16" height="2" rx="1" fill="#8AC4E8"/>
  <rect x="30" y="28" width="12" height="2" rx="1" fill="#8AC4E8"/>
  <rect x="14" y="32" width="18" height="2" rx="1" fill="#6AB0D8"/>
</svg>
