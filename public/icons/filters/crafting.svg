<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Anvil base -->
  <rect x="8" y="34" width="32" height="8" rx="2" fill="#5A6070"/>
  <!-- Anvil body -->
  <rect x="12" y="24" width="24" height="12" fill="#5A6070"/>
  <!-- Anvil horn (left) -->
  <polygon points="12,24 4,28 4,32 12,32" fill="#5A6070"/>
  <!-- Anvil top face -->
  <rect x="10" y="20" width="28" height="6" rx="1" fill="#6A7080"/>
  <!-- Hammer handle -->
  <rect x="30" y="8" width="5" height="20" rx="2" fill="#8B6D4A" transform="rotate(-30 32 18)"/>
  <!-- Hammer head -->
  <rect x="32" y="6" width="10" height="7" rx="1" fill="#5A6070" transform="rotate(-30 37 9)"/>
</svg>
