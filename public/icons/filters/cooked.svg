<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Cooked meat on bone -->
  <polygon points="10,18 38,14 40,32 12,36" fill="#A06030"/>
  <!-- Sear marks -->
  <rect x="16" y="20" width="14" height="2" fill="#7A4020"/>
  <rect x="14" y="26" width="16" height="2" fill="#7A4020"/>
  <rect x="18" y="32" width="10" height="2" fill="#7A4020"/>
  <!-- Bone end -->
  <rect x="38" y="18" width="6" height="10" rx="3" fill="#E0D8C8"/>
  <!-- Steam -->
  <rect x="20" y="6" width="2" height="6" fill="#D0D0D0" opacity="0.5"/>
  <rect x="28" y="8" width="2" height="5" fill="#D0D0D0" opacity="0.5"/>
</svg>
