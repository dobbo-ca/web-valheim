<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Workbench top surface -->
  <rect x="4" y="20" width="40" height="6" rx="1" fill="#8B6D4A"/>
  <!-- Left leg -->
  <rect x="6" y="26" width="5" height="18" rx="1" fill="#6A5030"/>
  <!-- Right leg -->
  <rect x="37" y="26" width="5" height="18" rx="1" fill="#6A5030"/>
  <!-- Cross brace -->
  <polygon points="11,38 37,28 37,32 11,42" fill="#6A5030"/>
  <!-- Plank on top -->
  <rect x="8" y="14" width="32" height="8" rx="1" fill="#8B6D4A"/>
  <!-- Wood grain lines -->
  <rect x="12" y="15" width="1" height="6" fill="#6A5030" opacity="0.5"/>
  <rect x="20" y="15" width="1" height="6" fill="#6A5030" opacity="0.5"/>
  <rect x="28" y="15" width="1" height="6" fill="#6A5030" opacity="0.5"/>
  <rect x="36" y="15" width="1" height="6" fill="#6A5030" opacity="0.5"/>
</svg>
