<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Plaque -->
  <rect x="10" y="28" width="28" height="14" rx="2" fill="#A0722A"/>
  <!-- Head -->
  <rect x="15" y="14" width="18" height="18" rx="3" fill="#A0A0A0"/>
  <!-- Snout (elongated wolf muzzle) -->
  <rect x="17" y="26" width="14" height="8" rx="3" fill="#808080"/>
  <!-- Ears -->
  <polygon points="15,14 11,6 18,10" fill="#A0A0A0"/>
  <polygon points="33,14 37,6 30,10" fill="#A0A0A0"/>
  <!-- Eyes -->
  <rect x="17" y="18" width="3" height="3" fill="#3A3A3A"/>
  <rect x="28" y="18" width="3" height="3" fill="#3A3A3A"/>
  <!-- Nose -->
  <rect x="21" y="28" width="6" height="3" rx="1" fill="#3A3A3A"/>
</svg>
