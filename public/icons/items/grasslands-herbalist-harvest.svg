<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Pouch body -->
  <rect x="14" y="24" width="20" height="18" rx="3" fill="#6A8A2A"/>
  <!-- Highlight side -->
  <rect x="14" y="24" width="6" height="18" rx="3" fill="#8AAA4A"/>
  <!-- Shadow side -->
  <rect x="28" y="24" width="6" height="18" rx="3" fill="#4A6A1A"/>
  <!-- Gathered top / neck -->
  <rect x="18" y="18" width="12" height="8" rx="2" fill="#4A6A1A"/>
  <!-- String tie -->
  <rect x="16" y="20" width="16" height="3" rx="1" fill="#8B6D4A"/>
  <!-- Bow knot -->
  <polygon points="22,18 18,14 22,16" fill="#8B6D4A"/>
  <polygon points="26,18 30,14 26,16" fill="#8B6D4A"/>
  <rect x="22" y="16" width="4" height="4" rx="1" fill="#8B6D4A"/>
  <!-- Flower/herb sprigs -->
  <rect x="22" y="8" width="2" height="10" fill="#6A8A2A"/>
  <circle cx="23" cy="8" r="3" fill="#FFD700"/>
</svg>
