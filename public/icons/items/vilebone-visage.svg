  <rect x="27" y="20" width="6" height="5" rx="1" fill="#1A1A0A"/>
  <rect x="16" y="21" width="4" height="3" rx="1" fill="#5A8A3A"/>
  <rect x="28" y="21" width="4" height="3" rx="1" fill="#5A8A3A"/>
  <!-- Jaw -->
  <rect x="16" y="28" width="16" height="4" rx="1" fill="#B0A890"/>
  <rect x="18" y="30" width="3" height="3" fill="#E0D8C0"/>
