<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Handle -->
  <rect x="20" y="22" width="6" height="24" fill="#A0722A"/>
  <!-- Handle wrap -->
  <rect x="20" y="26" width="6" height="2" fill="#7A5218"/>
  <rect x="20" y="32" width="6" height="2" fill="#7A5218"/>
  <!-- Mace head body -->
  <rect x="10" y="6" width="28" height="18" rx="2" fill="#C8B090"/>
  <!-- Antler prong left -->
  <polygon points="10,6 4,2 8,12" fill="#C8B090"/>
  <!-- Antler prong right -->
  <polygon points="38,6 44,2 40,12" fill="#C8B090"/>
  <!-- Head shadow -->
  <rect x="10" y="18" width="28" height="4" fill="#A89870"/>
  <!-- Pommel -->
  <rect x="18" y="44" width="10" height="4" rx="2" fill="#7A5218"/>
</svg>
