<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Plaque -->
  <rect x="8" y="30" width="32" height="14" rx="2" fill="#A0722A"/>
  <!-- Large head -->
  <rect x="12" y="14" width="24" height="20" rx="4" fill="#8B6D4A"/>
  <!-- Snout -->
  <rect x="16" y="28" width="16" height="8" rx="3" fill="#7A5C3A"/>
  <!-- Horns -->
  <rect x="10" y="8" width="5" height="10" rx="2" fill="#AA8A6A"/>
  <rect x="33" y="8" width="5" height="10" rx="2" fill="#AA8A6A"/>
  <!-- Horn tips curve -->
  <rect x="7" y="8" width="5" height="4" rx="2" fill="#AA8A6A"/>
  <rect x="36" y="8" width="5" height="4" rx="2" fill="#AA8A6A"/>
  <!-- Eyes -->
  <rect x="16" y="20" width="4" height="4" fill="#3A2A1A"/>
  <rect x="28" y="20" width="4" height="4" fill="#3A2A1A"/>
  <!-- Nose -->
