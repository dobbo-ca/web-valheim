<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Bone fist weapon with claws -->
  <rect x="12" y="20" width="24" height="18" rx="4" fill="#6B4226"/>
  <rect x="16" y="24" width="16" height="12" rx="3" fill="#8B5A3A"/>
  <!-- Bone knuckle guard -->
  <rect x="10" y="18" width="28" height="5" rx="2" fill="#C8C0A8"/>
  <!-- Claws -->
  <polygon points="12,18 14,4 16,18" fill="#D8D0B8"/>
  <polygon points="20,18 22,2 24,18" fill="#D8D0B8"/>
  <polygon points="28,18 30,4 32,18" fill="#D8D0B8"/>
  <polygon points="34,18 36,6 38,18" fill="#C8C0A8"/>
  <!-- Claw tips - green -->
  <rect x="13" y="4" width="2" height="4" fill="#5A8A3A"/>
  <rect x="21" y="2" width="2" height="4" fill="#5A8A3A"/>
  <rect x="29" y="4" width="2" height="4" fill="#5A8A3A"/>
  <rect x="35" y="6" width="2" height="4" fill="#5A8A3A"/>
</svg>
