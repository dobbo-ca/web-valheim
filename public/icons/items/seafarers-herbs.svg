<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Pouch body -->
  <rect x="14" y="24" width="20" height="18" rx="3" fill="#2A6A6A"/>
  <!-- Shadow side -->
  <rect x="28" y="24" width="6" height="18" rx="3" fill="#1A4A4A"/>
  <!-- Gathered top / neck -->
  <rect x="18" y="18" width="12" height="8" rx="2" fill="#1A4A4A"/>
  <!-- String tie -->
  <rect x="16" y="20" width="16" height="3" rx="1" fill="#8B6D4A"/>
  <!-- Bow knot -->
  <polygon points="22,18 18,14 22,16" fill="#8B6D4A"/>
  <polygon points="26,18 30,14 26,16" fill="#8B6D4A"/>
  <rect x="22" y="16" width="4" height="4" rx="1" fill="#8B6D4A"/>
  <!-- Herb sprigs -->
  <rect x="20" y="8" width="2" height="10" fill="#2A6A6A"/>
  <rect x="26" y="10" width="2" height="8" fill="#2A6A6A"/>
  <polygon points="20,12 16,10 20,14" fill="#2A8A8A"/>
  <polygon points="28,14 32,12 28,16" fill="#2A8A8A"/>
</svg>
